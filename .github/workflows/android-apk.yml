name: Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_release:
        description: Upload the latest APKs to the rolling daily GitHub release
        required: false
        type: boolean
        default: true

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x PipePipeClient/gradlew

      - name: Prepare signing keystore
        shell: bash
        env:
          PIPEPIPE_SIGNING_KEYSTORE_BASE64: ${{ secrets.PIPEPIPE_SIGNING_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${PIPEPIPE_SIGNING_KEYSTORE_BASE64}" ]]; then
            echo "No shared signing keystore configured; using default signing."
            exit 0
          fi

          mkdir -p PipePipeClient/keystore
          printf '%s' "${PIPEPIPE_SIGNING_KEYSTORE_BASE64}" | base64 --decode \
            > PipePipeClient/keystore/pipepipe-daily-debug.keystore

      - name: Prepare daily build metadata
        id: metadata
        shell: bash
        run: |
          version_name=$(grep -m1 'versionName "' PipePipeClient/app/build.gradle | sed -E 's/.*versionName "([^"]+)".*/\1/')
          short_sha="${GITHUB_SHA::7}"
          build_timestamp=$(date -u +'%Y%m%d%H%M%S')
          build_id="${build_timestamp}-${short_sha}"

          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "build_id=${build_id}" >> "$GITHUB_OUTPUT"

          {
            echo "Rolling daily release for PipePipe Daily."
            echo
            echo "Version-Name: ${version_name}"
            echo "Build-ID: ${build_id}"
            echo "Channel: GitHub Daily"
            echo "Source: ${GITHUB_REPOSITORY}"
          } > "${RUNNER_TEMP}/daily-release-notes.txt"

      - name: Build daily debug APK
        working-directory: PipePipeClient
        env:
          UPDATE_API_URL: https://api.github.com/repos/${{ github.repository }}/releases/tags/daily-latest
          UPDATE_RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/daily-latest
          SIGNING_STORE_PASSWORD: ${{ secrets.PIPEPIPE_SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.PIPEPIPE_SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.PIPEPIPE_SIGNING_KEY_PASSWORD }}
        run: |
          signing_args=()
          if [[ -f keystore/pipepipe-daily-debug.keystore \
              && -n "${SIGNING_STORE_PASSWORD}" \
              && -n "${SIGNING_KEY_ALIAS}" \
              && -n "${SIGNING_KEY_PASSWORD}" ]]; then
            signing_args+=(
              "-Ppipepipe.signingStoreFile=keystore/pipepipe-daily-debug.keystore"
              "-Ppipepipe.signingStorePassword=${SIGNING_STORE_PASSWORD}"
              "-Ppipepipe.signingKeyAlias=${SIGNING_KEY_ALIAS}"
              "-Ppipepipe.signingKeyPassword=${SIGNING_KEY_PASSWORD}"
            )
          fi

          ./gradlew assembleDebug -DskipFormatKtlint \
            -Ppipepipe.debugAppName='PipePipe Daily' \
            -Ppipepipe.debugPackageSuffix='.debug' \
            -Ppipepipe.debugArchiveBaseName='PipePipe_daily' \
            -Ppipepipe.buildChannel='Daily' \
            -Ppipepipe.debugUpdateChannelName='GitHub Daily' \
            -Ppipepipe.debugUpdateSourceLabel='${{ github.repository }} / daily-latest' \
            -Ppipepipe.debugUpdateApiUrl="${UPDATE_API_URL}" \
            -Ppipepipe.debugUpdateReleaseUrl="${UPDATE_RELEASE_URL}" \
            -Ppipepipe.updateBuildId='${{ steps.metadata.outputs.build_id }}' \
            "${signing_args[@]}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: PipePipe-daily-apks
          retention-days: 14
          if-no-files-found: error
          path: PipePipeClient/app/build/outputs/apk/debug/*.apk

      - name: Publish rolling prerelease
        if: ${{ github.event_name == 'push' || inputs.publish_release }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="daily-latest"
          title="PipePipe Daily Latest"
          notes_file="${RUNNER_TEMP}/daily-release-notes.txt"

          shopt -s nullglob
          files=(PipePipeClient/app/build/outputs/apk/debug/*.apk)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No APK files found to publish" >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$title" \
              --notes-file "$notes_file" \
              --prerelease \
              --target "$GITHUB_SHA"
          else
            gh release create "$tag" \
              --title "$title" \
              --notes-file "$notes_file" \
              --prerelease \
              --target "$GITHUB_SHA"
          fi

          gh release upload "$tag" "${files[@]}" --clobber
